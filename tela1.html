<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sistema de Demandas</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>
  <div class="text-center mb-5">
    <h1 class="display-4 fw-bold">Perfil temporario</h1>
    <h3 class="text-secondary fs-5">Perfil selecionado pelo usuário</h3>
  </div>

  <div class="container">
    <div class="row justify-content-center g-4">

      <div class="col-12 col-sm-6 col-md-4">
        <div class="card-demanda p-4 text-center">
          <i class="bi bi-plus-circle mb-3 d-block"></i>
          <h5 class="fw-semibold">Criar Demanda</h5>
        </div>
      </div>

      <div class="col-12 col-sm-6 col-md-4">
        <div class="card-demanda p-4 text-center">
          <i class="bi bi-person-lines-fill mb-3 d-block"></i>
          <h5 class="fw-semibold">Minhas Demandas</h5>
        </div>
      </div>

      <div class="col-12 col-sm-6 col-md-4">
        <div class="card-demanda p-4 text-center">
          <i class="bi bi-list-task mb-3 d-block"></i>
          <h5 class="fw-semibold">Todas as Demandas</h5>
        </div>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
